<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 전문가 과정 주관식 대비 모의고사</title>
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --success-color: #10B981;
            --danger-color: #EF4444;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            gap: 24px;
        }

        /* 메인 퀴즈 컨테이너 */
        .quiz-container {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            flex: 1;
            max-width: 800px;
            padding: 40px;
            box-sizing: border-box;
        }

        /* 우측 대시보드 (통계) */
        .dashboard-container {
            background-color: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            width: 320px;
            padding: 24px;
            box-sizing: border-box;
            position: sticky;
            top: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--bg-color);
        }

        h1 { font-size: 1.5rem; margin: 0; color: var(--primary-color); }
        h2 { font-size: 1.25rem; margin: 0 0 20px 0; color: var(--text-main); }

        .progress { font-weight: 700; color: var(--text-muted); background: #E5E7EB; padding: 4px 12px; border-radius: 20px; font-size: 0.9rem; }

        .professor-tag {
            display: inline-block;
            background-color: #EEF2FF;
            color: var(--primary-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        /* 문제 영역 이미지 반응형 처리 */
        .question-box {
            font-size: 1.125rem;
            line-height: 1.6;
            margin-bottom: 24px;
            font-weight: 500;
            background: #F8FAFC;
            padding: 24px;
            border-radius: 12px;
            border: 1px solid #E2E8F0;
        }
        .question-box img, .answer-content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            margin: 12px 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 16px;
            border: 2px solid #E5E7EB;
            border-radius: 12px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.2s;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        textarea:focus { outline: none; border-color: var(--primary-color); }

        .btn {
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            width: 100%;
        }

        .btn-primary { background-color: var(--primary-color); }
        .btn-primary:hover { background-color: var(--primary-hover); transform: translateY(-1px); }
        
        .btn-success { background-color: var(--success-color); }
        .btn-success:hover { background-color: #059669; }
        
        .btn-danger { background-color: var(--danger-color); }
        .btn-danger:hover { background-color: #DC2626; }

        .answer-section {
            display: none;
            margin-top: 32px;
            padding: 24px;
            background-color: #F0FDF4;
            border-radius: 12px;
            border-left: 5px solid var(--success-color);
            animation: fadeIn 0.5s;
        }

        .answer-title { font-size: 1.1rem; font-weight: 700; color: #166534; margin-bottom: 12px; }
        .answer-content { font-size: 1rem; line-height: 1.6; color: var(--text-main); margin-bottom: 24px; }
        .grading-buttons { display: flex; gap: 12px; }
        
        .result-screen { text-align: center; display: none; padding: 40px 0; }
        .score-display { font-size: 4rem; font-weight: 800; color: var(--primary-color); margin: 20px 0; }

        /* 대시보드 클릭 가능하게 수정 */
        .stat-item {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 12px;
            background-color: #F9FAFB;
            cursor: pointer;
            transition: transform 0.2s, background-color 0.2s, box-shadow 0.2s;
            border: 1px solid transparent;
        }
        .stat-item:hover {
            transform: translateY(-2px);
            background-color: #FFFFFF;
            border-color: #E5E7EB;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .stat-item.active {
            border-color: var(--primary-color);
            background-color: #EEF2FF;
        }

        .stat-header { display: flex; justify-content: space-between; font-size: 0.95rem; font-weight: 700; margin-bottom: 8px; }
        .stat-bar-bg { width: 100%; height: 8px; background-color: #E5E7EB; border-radius: 4px; overflow: hidden; display: flex; }
        .stat-bar-correct { height: 100%; background-color: var(--success-color); transition: width 0.3s ease; }
        .stat-bar-wrong { height: 100%; background-color: var(--danger-color); transition: width 0.3s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 아이폰/모바일 반응형 처리 */
        @media (max-width: 900px) {
            body { 
                flex-direction: column; 
                padding: 16px; 
                gap: 16px;
            }
            .quiz-container { 
                padding: 24px 20px; 
                width: 100%; 
                border-radius: 16px;
                order: 1; /* 위쪽 배치 */
            }
            .dashboard-container { 
                width: 100%; 
                position: static; 
                order: 2; /* 아래쪽 배치 */
            }
            .grading-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-screen">
        <div class="header">
            <h1>주관식 트레이닝</h1>
            <div style="display:flex; gap:12px; align-items:center;">
                <label style="display:flex; align-items:center; gap:8px; font-weight:600; color:var(--text-muted);">
                    <input type="checkbox" id="filter-hidden"> hidden 문제 예상
                </label>
                <div class="progress" id="progress-text">0 / 0</div>
            </div>
        </div>
        
        <div class="professor-tag" id="professor-tag">교수님</div>
        
        <div class="question-box" id="question-text">문제가 여기에 표시됩니다.</div>
        
        <textarea id="user-answer" placeholder="여기에 답안을 자유롭게 작성해보세요... (작성하지 않고 바로 확인도 가능합니다!)"></textarea>
        
        <button class="btn btn-primary" id="submit-btn" onclick="showAnswer()">정답 확인하기</button>

        <div class="answer-section" id="answer-section">
            <div class="answer-title">📝 모범 답안</div>
            <div class="answer-content" id="correct-answer">정답이 여기에 표시됩니다.</div>
            <div id="auto-grade-result" style="margin-top:12px; font-weight:700;"></div>
            
            <h3 style="margin-top:0; font-size: 1rem; text-align: center; color: var(--text-main);">내 답안과 비교했을 때 어떤가요?</h3>
            <div class="grading-buttons">
                <button class="btn btn-danger" onclick="gradeAnswer(false)">틀렸어요 😥</button>
                <button class="btn btn-success" onclick="gradeAnswer(true)">맞았어요! 🥳</button>
                <button class="btn btn-primary" style="width:auto; padding:10px 14px; margin-left:8px;" onclick="requestGrade()">자동 채점 (AI)</button>
            </div>
        </div>
    </div>

<div class="result-screen" id="result-screen">
    <h1>🎉 모든 학습 완료!</h1>
    <p>전체 모의고사를 끝마치셨습니다.</p>
    <div class="score-display" id="final-score">0 / 24</div>
    
    <button id="retry-wrong-btn" class="btn btn-danger" style="margin-bottom: 12px; display: none;" onclick="retryWrongQuestions()">틀린 문제만 다시 풀기 🎯</button>
    
    <button class="btn btn-primary" onclick="location.reload()">처음부터 다시 풀기</button>
</div>

<div class="dashboard-container">
    <h2>📊 학습 현황</h2>
    <p style="font-size: 0.85rem; color: var(--text-muted); margin-top: -15px; margin-bottom: 20px;">박스를 누르면 해당 교수님 문제로 이동합니다.</p>
    <div id="stats-container">
        </div>
</div>

<script>
    // questions는 외부 JSON으로 관리하도록 변경
    let allQuestions = []; // 전체 문제 로드
    let questions = []; // 필터 적용된 문제 목록

    let currentIndex = 0;
    
    // 문제 채점 상태를 저장하는 배열 (null: 안풂, true: 맞음, false: 틀림)
    const questionStates = new Array(questions.length).fill(null);

    // DOM 요소
    const progressText = document.getElementById('progress-text');
    const professorTag = document.getElementById('professor-tag');
    const questionText = document.getElementById('question-text');
    const userAnswer = document.getElementById('user-answer');
    const submitBtn = document.getElementById('submit-btn');
    const answerSection = document.getElementById('answer-section');
    const correctAnswer = document.getElementById('correct-answer');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const finalScore = document.getElementById('final-score');
    const statsContainer = document.getElementById('stats-container');

    // 우측 대시보드 렌더링 (클릭 이벤트 포함)
    function renderStats() {
        statsContainer.innerHTML = '';
        
        // 동적으로 교수님별 통계 계산
        const profStats = {};
        questions.forEach((q, idx) => {
            if (!profStats[q.professor]) {
                profStats[q.professor] = { total: 0, correct: 0, wrong: 0, firstIndex: -1 };
            }
            if (profStats[q.professor].firstIndex === -1) profStats[q.professor].firstIndex = idx;
            
            profStats[q.professor].total++;
            if (questionStates[idx] === true) profStats[q.professor].correct++;
            if (questionStates[idx] === false) profStats[q.professor].wrong++;
        });

        for (const [prof, data] of Object.entries(profStats)) {
            const attempted = data.correct + data.wrong;
            const correctPercent = data.total === 0 ? 0 : (data.correct / data.total) * 100;
            const wrongPercent = data.total === 0 ? 0 : (data.wrong / data.total) * 100;
            const isActive = questions[currentIndex].professor === prof ? 'active' : '';

            const statHtml = `
                <div class="stat-item ${isActive}" onclick="jumpToProfessor('${prof}')">
                    <div class="stat-header">
                        <span>${prof}</span>
                        <span style="color: var(--text-muted);">${attempted} / ${data.total} 문제</span>
                    </div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-correct" style="width: ${correctPercent}%"></div>
                        <div class="stat-bar-wrong" style="width: ${wrongPercent}%"></div>
                    </div>
                    <div style="font-size: 0.8rem; margin-top: 6px; display: flex; justify-content: space-between;">
                        <span style="color: var(--success-color); font-weight: 600;">맞음: ${data.correct}</span>
                        <span style="color: var(--danger-color); font-weight: 600;">틀림: ${data.wrong}</span>
                    </div>
                </div>
            `;
            statsContainer.innerHTML += statHtml;
        }
    }

    // 교수님 클릭 시 해당 첫 번째 문제로 점프
    function jumpToProfessor(profName) {
        const jumpIndex = questions.findIndex(q => q.professor === profName);
        if (jumpIndex !== -1) {
            currentIndex = jumpIndex;
            loadQuestion();
        }
    }

    // 문제 화면 띄우기
    function loadQuestion() {
        // 맨 위로 스크롤 애니메이션 (모바일에서 매우 유용함)
        window.scrollTo({ top: 0, behavior: 'smooth' });

        const q = questions[currentIndex];
        progressText.innerText = `${currentIndex + 1} / ${questions.length}`;
        professorTag.innerText = q.professor;
        questionText.innerHTML = q.question; // innerHTML로 변경하여 HTML 태그 작동
        correctAnswer.innerHTML = q.answer;  // innerHTML로 변경
        
        userAnswer.value = '';
        answerSection.style.display = 'none';
        submitBtn.style.display = 'block';
        
        renderStats(); // 활성화된 박스 표시 업데이트
    }

    // 정답 확인버튼 클릭 (빈칸 제출 허용)
    function showAnswer() {
        submitBtn.style.display = 'none';
        answerSection.style.display = 'block';
        
        // 정답 스크롤 자동 이동
        setTimeout(() => {
            answerSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    // 맞았어요 / 틀렸어요 채점 로직
    function gradeAnswer(isCorrect) {
        // 현재 문제 상태 업데이트
        questionStates[currentIndex] = isCorrect;
        
        // 안 푼(null 인) 문제 찾기 (현재 번호 이후부터 탐색, 없으면 처음부터)
        let nextIndex = questionStates.findIndex((state, idx) => idx > currentIndex && state === null);
        if (nextIndex === -1) {
            nextIndex = questionStates.findIndex(state => state === null);
        }

        // 안 푼 문제가 남아있다면 그곳으로 이동
        if (nextIndex !== -1) {
            currentIndex = nextIndex;
            loadQuestion();
        } else {
            // 모든 배열에 값이 채워졌으면(null이 없으면) 결과 화면 출력
            renderStats(); 
            showResults();
        }
    }

// 1. 기존 showResults() 함수 덮어쓰기
function showResults() {
    quizScreen.style.display = 'none';
    resultScreen.style.display = 'block';
    
    // 맞은 개수 및 틀린 개수 카운트
    const totalCorrect = questionStates.filter(state => state === true).length;
    const totalWrong = questionStates.filter(state => state === false).length;
    
    finalScore.innerText = `${totalCorrect} / ${questions.length}`;

    // 틀린 문제가 1개라도 있으면 '틀린 문제만 다시 풀기' 버튼 표시
    const retryBtn = document.getElementById('retry-wrong-btn');
    if (retryBtn) {
        retryBtn.style.display = totalWrong > 0 ? 'block' : 'none';
    }
}

// 2. 새로운 함수 추가: 틀린 문제만 모아서 다시 시작
function retryWrongQuestions() {
    // 기존 질문 목록에서 상태가 false(틀림)인 문제들만 추출
    const wrongQuestions = questions.filter((q, idx) => questionStates[idx] === false);
    
    if (wrongQuestions.length === 0) return; // 혹시 모를 예외 처리

    // 현재 문제 목록을 틀린 문제들로 덮어씌움
    questions = wrongQuestions;
    
    // 상태 배열 크기를 맞추고 모두 null(안 풂)로 초기화
    questionStates.length = questions.length;
    for (let i = 0; i < questions.length; i++) {
        questionStates[i] = null;
    }

    // 인덱스 초기화 및 화면 전환
    currentIndex = 0;
    resultScreen.style.display = 'none';
    quizScreen.style.display = 'block';
    
    // 새로운 목록으로 첫 문제 로드
    loadQuestion();
}
    // 자동 채점 요청 (프론트엔드)
    async function requestGrade() {
    const resultDiv = document.getElementById('auto-grade-result');
    const studentAns = userAnswer.value.trim();

    // 누르자마자 바로 구라핑
    resultDiv.style.color = 'var(--primary-color)';
    resultDiv.innerHTML = `
        <strong>자동채점! 🎊</strong><br>
        <span style="font-size: 0.9rem; color: var(--text-muted); display: inline-block; margin-top: 8px;">
        ...은 <strong>구라인데용</strong> 😜<br>
        백앤드가 없어서 구현 못합니다 휴먼 ㅠ<br>
        양심에 손을 얹고 스스로 맞았는지 틀렸는지 버튼을 눌러주세요.
        </span>
    `;
}

    // 앱 시작 시 최초 실행
    // 체크박스 필터 토글 이벤트와 JSON 로드
    document.getElementById('filter-hidden').addEventListener('change', () => {
        applyFilter();
    });

    // JSON에서 문제 로드 (questions.json 파일 필요)
    fetch('questions.json')
        .then(res => res.json())
        .then(data => {
            // 예상: data는 배열 형태의 문제 목록
            allQuestions = data.map((q, idx) => ({ id: q.id ?? idx, hidden: q.hidden ?? false, ...q }));
            // 초기 필터 적용
            applyFilter();
        })
        .catch(err => {
            console.error('questions.json 로드 실패, 내부 기본 목록 사용', err);
            // fallback: 기존 내장 questions가 필요하면 구현
        });

    function applyFilter() {
        const showHidden = document.getElementById('filter-hidden').checked;
        questions = allQuestions.filter(q => showHidden ? q.hidden === true : q.hidden !== true);
        // 질문 상태 배열 재설정
        questionStates.length = questions.length;
        for (let i = 0; i < questions.length; i++) questionStates[i] = null;
        currentIndex = 0;
        if (questions.length > 0) loadQuestion();
        else {
            questionText.innerHTML = '조건에 맞는 문제가 없습니다.';
            professorTag.innerText = '';
            progressText.innerText = `0 / 0`;
        }
    }
</script>

</body>
</html>
