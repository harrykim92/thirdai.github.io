<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 전문가 과정 주관식 대비 모의고사</title>
    <style>
        :root {
            --primary-color: #4F46E5;
            --primary-hover: #4338CA;
            --success-color: #10B981;
            --danger-color: #EF4444;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-muted: #6B7280;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            gap: 24px;
        }

        /* 메인 퀴즈 컨테이너 */
        .quiz-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            flex: 1;
            max-width: 800px;
            padding: 40px;
            box-sizing: border-box;
        }

        /* 우측 대시보드 (통계) */
        .dashboard-container {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            width: 320px;
            padding: 24px;
            box-sizing: border-box;
            position: sticky;
            top: 40px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 2px solid var(--bg-color);
        }

        h1 { font-size: 1.5rem; margin: 0; color: var(--primary-color); }
        h2 { font-size: 1.25rem; margin: 0 0 20px 0; color: var(--text-main); }

        .progress { font-weight: 600; color: var(--text-muted); }

        .professor-tag {
            display: inline-block;
            background-color: #EEF2FF;
            color: var(--primary-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.875rem;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .question-box {
            font-size: 1.125rem;
            line-height: 1.6;
            margin-bottom: 24px;
            font-weight: 500;
            white-space: pre-wrap;
            background: #F8FAFC;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #E2E8F0;
        }

        textarea {
            width: 100%;
            height: 180px;
            padding: 16px;
            border: 2px solid #E5E7EB;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            box-sizing: border-box;
            transition: border-color 0.2s;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        textarea:focus { outline: none; border-color: var(--primary-color); }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            color: white;
            width: 100%;
        }

        .btn-primary { background-color: var(--primary-color); }
        .btn-primary:hover { background-color: var(--primary-hover); }
        
        .btn-success { background-color: var(--success-color); }
        .btn-success:hover { background-color: #059669; }
        
        .btn-danger { background-color: var(--danger-color); }
        .btn-danger:hover { background-color: #DC2626; }

        .answer-section {
            display: none;
            margin-top: 32px;
            padding: 24px;
            background-color: #F0FDF4;
            border-radius: 8px;
            border-left: 4px solid var(--success-color);
            animation: fadeIn 0.5s;
        }

        .answer-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #166534;
            margin-bottom: 12px;
        }

        .answer-content {
            font-size: 1rem;
            line-height: 1.6;
            color: var(--text-main);
            white-space: pre-wrap;
            margin-bottom: 24px;
        }

        .grading-buttons { display: flex; gap: 12px; }
        
        .result-screen { text-align: center; display: none; padding: 40px 0; }
        .score-display { font-size: 4rem; font-weight: 800; color: var(--primary-color); margin: 20px 0; }

        /* 대시보드 통계 UI */
        .stat-item {
            margin-bottom: 16px;
        }
        .stat-header {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 6px;
        }
        .stat-bar-bg {
            width: 100%;
            height: 10px;
            background-color: #E5E7EB;
            border-radius: 5px;
            overflow: hidden;
            display: flex;
        }
        .stat-bar-correct {
            height: 100%;
            background-color: var(--success-color);
            transition: width 0.3s ease;
        }
        .stat-bar-wrong {
            height: 100%;
            background-color: var(--danger-color);
            transition: width 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            body { flex-direction: column; align-items: center; }
            .dashboard-container { width: 100%; position: static; }
        }
    </style>
</head>
<body>

<div class="quiz-container">
    <div id="quiz-screen">
        <div class="header">
            <h1>주관식 트레이닝</h1>
            <div class="progress" id="progress-text">1 / 24</div>
        </div>
        
        <div class="professor-tag" id="professor-tag">교수님</div>
        <div class="question-box" id="question-text">문제가 여기에 표시됩니다.</div>
        
        <textarea id="user-answer" placeholder="여기에 답안을 자유롭게 작성해보세요..."></textarea>
        
        <button class="btn btn-primary" id="submit-btn" onclick="showAnswer()">정답 확인하기</button>

        <div class="answer-section" id="answer-section">
            <div class="answer-title">📝 모범 답안</div>
            <div class="answer-content" id="correct-answer">정답이 여기에 표시됩니다.</div>
            
            <h3 style="margin-top:0; font-size: 1rem; text-align: center; color: var(--text-main);">내 답안과 비교했을 때 어떤가요?</h3>
            <div class="grading-buttons">
                <button class="btn btn-danger" onclick="gradeAnswer(false)">틀렸어요 😥</button>
                <button class="btn btn-success" onclick="gradeAnswer(true)">맞았어요! 🥳</button>
            </div>
        </div>
    </div>

    <div class="result-screen" id="result-screen">
        <h1>🎉 학습 완료!</h1>
        <p>전체 모의고사를 끝마치셨습니다.</p>
        <div class="score-display" id="final-score">0 / 24</div>
        <button class="btn btn-primary" onclick="location.reload()">처음부터 다시 풀기</button>
    </div>
</div>

<div class="dashboard-container">
    <h2>📊 학습 현황</h2>
    <div id="stats-container">
        </div>
</div>

<script>
    // 파싱된 모든 문제 데이터베이스 (총 24문제)
    const questions = [
        // 주한별 교수님 (7문제)
        {
            professor: "주한별 교수님",
            question: "(1) Homogeneous coordinate X = [0, 4, 4, 2]로 주어진 3D point를 Euclidean coordinate로 변환하십시오.\n\n(2) Euclidean coordinate Y = [3, -1, 5] 로 주어진 3D point를 homogeneous coordinate로 변환하십시오.",
            answer: "(1) 마지막 성분 w=2 로 각 성분을 나누면 [0/2, 4/2, 4/2] = [0, 2, 2]\n\n(2) 마지막 성분에 1을 추가하면 [3, -1, 5, 1]"
        },
        {
            professor: "주한별 교수님",
            question: "3D point X = [0, 3, 2]를 다음 camera matrix P로 project할 때, projected 2D point를 inhomogeneous coordinate로 구하십시오.\n\nP = \n[  5  -14   2   17 ]\n[-10   -5 -10   50 ]\n[ 10    2 -11   19 ]",
            answer: "X를 homogeneous coordinate로 표현하면 X=[0, 3, 2, 1] 이고, projection matrix를 곱해 얻은 projected point는 PX = [-21, 15, 3]^T 이다.\n\n이를 inhomogeneous coordinate로 표현하기 위해 마지막 성분(3)으로 나누면 [-7, 5] 이다."
        },
        {
            professor: "주한별 교수님",
            question: "카메라 projection matrix P는 intrinsic K, extrinsic (R, t)로 구성되어 있습니다. P를 K, R, t를 사용하여 표현하고, P, K, R, t 각각이 무엇을 의미하는지와 그 degree of freedom(자유도)을 서술하시오.",
            answer: "카메라 projection matrix는 intrinsic과 extrinsic의 곱으로 P = K[R|t] 와 같이 표현되며, 3D world 점을 2D 이미지로 사영한다.\n\n- K: 카메라 내부 파라미터. 초점거리(fx, fy), 주점(cx, cy), skew(s)의 5개이므로 DOF는 5이다.\n- R: world에 대한 카메라의 방향(회전). 세 회전각으로 결정되어 DOF는 3이다.\n- t: 카메라의 3D 위치(이동). 세 성분을 가져 DOF는 3이다.\n- P: 전체 사영 변환. 3x4=12 원소에서 scale 1개를 빼 DOF는 11이다. (5+3+3=11로 구성요소 자유도 합과 일치)"
        },
        {
            professor: "주한별 교수님",
            question: "[예상] Homogeneous Coordinates(동차 좌표계)를 사용하는 기하학적/수학적 이점을 설명하고, Homogeneous space에서 두 점을 지나는 선(Line)과 두 선이 만나는 교점(Intersection)을 구하는 관계식을 간단히 서술하시오.",
            answer: "개념/이점: 무한대 점과 무한대 선을 유한한 숫자로 표현할 수 있게 해주며, 투영 변환 같은 비선형 연산을 행렬 곱셈을 통한 선형 연산으로 간단하게 만들어 줍니다.\n\n관계/계산:\n- 선 정의: 두 점 x1과 x2를 지나는 선 l은 외적(Cross product)으로 정의됩니다. (l = x1 × x2)\n- 교점: 두 선 l1과 l2가 만나는 점 x 역시 외적으로 구해집니다. (x = l1 × l2)"
        },
        {
            professor: "주한별 교수님",
            question: "[예상] Homography(호모그래피)의 기하학적 개념을 설명하고, 두 이미지 평면 간의 Homography 행렬 H를 구하기 위해 최소 몇 개의 대응점(Point Correspondences)이 필요한지 그 이유와 함께 설명하시오.",
            answer: "개념: 하나의 평면을 다른 평면으로 투영(Mapping)시키는 변환 행렬입니다. 동일한 평면을 서로 다른 두 카메라 시점에서 바라봤을 때 픽셀 좌표를 연결해주는 모델입니다.\n\n최소 대응점: Homography 매트릭스 H는 3x3 행렬이지만 scale ambiguity로 인해 자유도(DOF)가 8개입니다. 한 쌍의 매칭점마다 x, y 방향에 대한 2개의 방정식이 나오므로, 8개의 미지수를 구하려면 최소 4쌍의 대응점이 필요합니다."
        },
        {
            professor: "주한별 교수님",
            question: "[예상] 카메라 Projection Matrix의 구성 요소인 Intrinsic Parameters(내부 파라미터)와 Extrinsic Parameters(외부 파라미터)가 각각 카메라의 어떤 물리적/기하학적 속성을 나타내는지 구분하여 설명하시오.",
            answer: "Extrinsic Parameters [R|t]: 월드 좌표계에서 카메라 좌표계로 변환하는 회전(R)과 평행이동(t) 행렬입니다. 즉, 월드 상에서 카메라가 어디에 위치하고 어느 방향을 보고 있는지를 나타냅니다.\n\nIntrinsic Parameters (K): 카메라 좌표계의 3D 점을 2D 이미지 픽셀로 변환하는 요소입니다. 카메라 렌즈와 센서의 고유한 물리적 특성인 초점 거리(Focal length), 주점(Principal point), 스큐(Skew) 등을 포함합니다."
        },
        {
            professor: "주한별 교수님",
            question: "[예상] 월드 좌표계의 3D 점이 카메라 렌즈를 거쳐 2D 이미지의 픽셀로 투영되는 전체 과정을 수식 x = PX 를 기반으로 설명하고, 마지막 단계에서 실제 2D 픽셀 좌표를 얻기 위해 homogenous 벡터에서 어떤 추가 연산이 필요한지 서술하시오.",
            answer: "과정 설명:\n1. 월드 좌표의 3D 점 X가 외부 파라미터 행렬 [R|t]와 곱해져 카메라 기준 3D 좌표로 변환됨.\n2. 그 후 내부 파라미터 K와 곱해져 3x1 형태의 homogenous 2D 점 좌표 x~ = (u', v', w')^T 로 투영됨.\n\n추가 연산 (Perspective division):\n얻어진 결과는 동차 좌표계 형태이므로, 실제 유클리디안 2D 픽셀 좌표 (u, v)를 얻기 위해서는 벡터의 각 요소를 마지막 차원인 w'(일반적으로 깊이값 Z)로 나누어주는 과정이 필수적입니다. (u = u'/w', v = v'/w')"
        },

        // 하순회 교수님 (3문제)
        {
            professor: "하순회 교수님",
            question: "이종 병렬 시스템으로 구현되는 임베디드 시스템에서 딥러닝 SW를 최적화하기 위해 다음 기법이 추구하는 목표를 간략히 설명하여라.\n\n(1) Quantization\n(2) Pruning\n(3) Network parallelization",
            answer: "(1) Quantization: 모델의 정확도를 유지하면서 데이터를 표현하는 비트수를 최대로 줄임으로 해서 메모리 사용량을 줄이고자 함. 프로세서가 적은 비트 연산을 지원하면 수행 시간도 줄이는 효과를 얻음.\n\n(2) Pruning: 딥러닝 응용이 redundant 한 연산을 수행하고 있기 때문에 수행하는 연산의 개수를 줄임으로 해서 수행 시간을 줄이고자 함.\n\n(3) Parallelization: 모델의 병렬화를 통해 가용한 프로세서(CPU, GPU, NPU)의 효율을 최대로 높임으로 해서 실시간 성능을 극대화함 (처리량 증가, 지연시간 단축)."
        },
        {
            professor: "하순회 교수님",
            question: "입력 feature map의 크기가 100x100x100 이다. 커널 크기가 3x3인 필터 100개를 적용하는 convolution layer에 대하여 다음을 구하라. (패딩을 통해 입력과 출력 크기는 같다)\n\n(1) 이 모델을 수행하기 위해 필요한 MAC 연산의 개수는?\n(2) Bottleneck 구조(1x1 50개 -> 3x3 50개 -> 1x1 100개 순차 적용)를 사용할 경우 MAC 연산 수는?\n(3) Depthwise (3x3) + Pointwise (1x1) convolution을 사용할 경우 MAC 연산 수는?",
            answer: "(1) MAC 수: 100 x 100 x 100 x 3 x 3 x 100 = 9.0 x 10^8\n\n(2) 100x100x100x1x1x50 + 100x100x50x3x3x50 + 100x100x50x1x1x100\n= (0.5 + 2.25 + 0.5) x 10^8 = 3.25 x 10^8\n\n(3) 100x100x3x3x100 (Depthwise) + 100x100x100x1x1x100 (Pointwise)\n= (0.09 + 1.0) x 10^8 = 1.09 x 10^8"
        },
        {
            professor: "하순회 교수님",
            question: "Hardware-aware NAS (Neural Architecture Search)는 최적화된 네트워크 모델을 자동 탐색하는 기술로 3가지 요소로 구성되어 있다. 3가지 구성 요소(a, b, c)가 무엇인지 간략히 설명하여라.",
            answer: "(a) Search space (탐색 공간): 탐색할 네트워크 모델의 종류와 크기를 결정\n(b) Search strategy (탐색 방법): 탐색 공간을 어떻게 탐색하는 지에 대한 방법 결정\n(c) Performance estimation strategy (성능 예측 방법): 각 대상 모델의 성능을 예측하는 방법 결정"
        },

        // 한보형 교수님 (3문제)
        {
            professor: "한보형 교수님",
            question: "R-CNN 보다 Fast R-CNN 이 빠른 이유를 서술하시오.",
            answer: "R-CNN은 region proposal 마다 CNN을 개별 실행(~2,000 회)하지만, Fast R-CNN은 이미지 전체를 CNN에 한 번만 통과시켜 feature map 을 생성한 뒤 RoI Pooling 으로 각 영역의 특징을 추출한다.\n따라서 CNN 연산 횟수를 대폭 줄여 속도가 크게 향상된다."
        },
        {
            professor: "한보형 교수님",
            question: "RetinaNet 에서 사용된 Focal Loss 의 수식은 FL(pt) = -(1-pt)^γ * log(pt) 이다.\nγ=0 일 때 Focal Loss 와 동일해지는 기존 손실 함수의 명칭을 쓰고, γ>0 일 때 잘 분류된 예제(well-classified examples)에 미치는 효과를 서술하시오.",
            answer: "- γ=0 이면 Cross Entropy(CE) 손실과 동일하다.\n- γ>0 이면 잘 분류된 예제(pt 가 높은 샘플)의 손실이 크게 줄어들어(down-weighted), 모델이 학습이 어려운 예제(hard examples)에 더욱 집중하게 만드는 효과가 있다."
        },
        {
            professor: "한보형 교수님",

        {

        {

            question: "이미지 분류용 CNN을 FCN(Fully Convolutional Network)으로 변환하면 왜 임의 크기의 입력 이미지에 대해 spatial score map을 출력할 수 있는지 설명하고, 이 score map 으로부터 최종 semantic segmentation label map을 얻는 과정을 설명하시오.",
            answer: "설명: Fully-connected layer는 고정된 크기의 입력에 대해 하나의 벡터를 출력하지만, 이를 convolution layer로 바꾸면 같은 연산을 spatial location 마다 sliding window 방식으로 적용할 수 있기 때문에 임의 크기의 입력도 처리가 가능하다.\n\n과정: 각 위치마다 class 별 score 가 생성된 map에서, 최종적으로 각 픽셀(위치)마다 class score 가 가장 큰 class를 선택하는 'per-pixel argmax'를 수행하여 최종 label map을 얻는다. (필요 시 upsampling 수행)"
        },
        {
            professor: "홍승훈 교수님",
            question: "기본 FCN의 대표적인 한계 두 가지를 설명하고, 이를 개선하기 위해 사용되는 (1) encoder-decoder network, (2) atrous convolution 이 각각 어떤 문제를 해결하는지 설명하시오.",
            answer: "한계:\n1. 여러 번의 downsampling으로 해상도가 낮아져 물체의 경계나 세부 형태가 손실됨.\n2. Receptive field가 고정되어 있어 크기가 다양한 물체나 주변 문맥을 잘 처리하기 어려움.\n\n해결 방법:\n(1) Encoder-decoder: encoder에서 잃어버린 공간 정보를 decoder(skip connection, upsampling 등)에서 복원하여 더 정교한 해상도의 segmentation map을 만듦.\n(2) Atrous convolution: filter 사이에 hole을 두어 파라미터를 늘리거나 해상도를 낮추지 않고도 Receptive field를 넓힘으로써 넓은 문맥을 파악하게 함."
        },
        {
            professor: "홍승훈 교수님",
            question: "Semantic segmentation 관점에서 convolution 기반 encoder 와 self-attention 기반 Transformer encoder 의 차이를 receptive field, 입력 의존성, parameter sharing 측면에서 비교하시오.",
            answer: "- Receptive field: Conv는 local neighborhood에 한정되며 넓히려면 layer를 많이 쌓아야 함. 반면 Self-attention은 한 layer에서도 전체 입력을 보는 global receptive field를 가짐.\n- 입력 의존성: Conv 필터는 고정된 가중치를 사용하여 입력 내용에 상관없이 동일하게 연산(입력 독립적). Self-attention의 attention weight는 query와 key의 유사도로 계산되어 이미지 내용에 따라 동적으로 변함.\n- Parameter sharing: Conv는 위치마다 파라미터를 공유하므로 파라미터 효율성이 높음(Translation invariance). Self-attention은 쌍(pairwise) 연산을 수행하여 계산량은 높으나 동적인 문맥 파악에 유리함."
        }
    ];

    let currentIndex = 0;
    
    // 교수님별 통계 객체 생성
    const statsData = {};
    questions.forEach(q => {
        if (!statsData[q.professor]) {
            statsData[q.professor] = { total: 0, attempted: 0, correct: 0, wrong: 0 };
        }
        statsData[q.professor].total++;
    });

    // DOM 요소
    const progressText = document.getElementById('progress-text');
    const professorTag = document.getElementById('professor-tag');
    const questionText = document.getElementById('question-text');
    const userAnswer = document.getElementById('user-answer');
    const submitBtn = document.getElementById('submit-btn');
    const answerSection = document.getElementById('answer-section');
    const correctAnswer = document.getElementById('correct-answer');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    const finalScore = document.getElementById('final-score');
    const statsContainer = document.getElementById('stats-container');

    function renderStats() {
        statsContainer.innerHTML = '';
        
        for (const [prof, data] of Object.entries(statsData)) {
            const total = data.total;
            const correct = data.correct;
            const wrong = data.wrong;
            const attempted = correct + wrong;
            
            // 퍼센트 계산
            const correctPercent = total === 0 ? 0 : (correct / total) * 100;
            const wrongPercent = total === 0 ? 0 : (wrong / total) * 100;

            const statHtml = `
                <div class="stat-item">
                    <div class="stat-header">
                        <span>${prof}</span>
                        <span style="color: var(--text-muted);">${attempted} / ${total} 문제</span>
                    </div>
                    <div class="stat-bar-bg">
                        <div class="stat-bar-correct" style="width: ${correctPercent}%"></div>
                        <div class="stat-bar-wrong" style="width: ${wrongPercent}%"></div>
                    </div>
                    <div style="font-size: 0.8rem; margin-top: 4px; display: flex; justify-content: space-between;">
                        <span style="color: var(--success-color)">맞음: ${correct}</span>
                        <span style="color: var(--danger-color)">틀림: ${wrong}</span>
                    </div>
                </div>
            `;
            statsContainer.innerHTML += statHtml;
        }
    }

    function loadQuestion() {
        const q = questions[currentIndex];
        progressText.innerText = `${currentIndex + 1} / ${questions.length}`;
        professorTag.innerText = q.professor;
        questionText.innerText = q.question;
        correctAnswer.innerText = q.answer;
        
        userAnswer.value = '';
        answerSection.style.display = 'none';
        submitBtn.style.display = 'block';
        
        renderStats(); // 우측 통계 바 업데이트
    }

    function showAnswer() {
        submitBtn.style.display = 'none';
        answerSection.style.display = 'block';
    }

    function gradeAnswer(isCorrect) {
        const currentProf = questions[currentIndex].professor;
        
        if (isCorrect) {
            statsData[currentProf].correct++;
        } else {
            statsData[currentProf].wrong++;
        }
        
        currentIndex++;
        if (currentIndex < questions.length) {
            loadQuestion();
        } else {
            renderStats(); // 마지막 문제 푼 후 렌더링
            showResults();
        }
    }

    function showResults() {
        quizScreen.style.display = 'none';
        resultScreen.style.display = 'block';
        
        let totalCorrect = 0;
        for(let key in statsData) { totalCorrect += statsData[key].correct; }
        
        finalScore.innerText = `${totalCorrect} / ${questions.length}`;
    }

    // 초기화
    loadQuestion();
</script>
